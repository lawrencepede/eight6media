<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Lovable App</title>
    <meta name="description" content="Lovable Generated Project" />
    <meta name="author" content="Lovable" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Lovable App" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <!-- Domain-aware favicon: swap to Not Agency mark on thenotagency.com -->
    <script>
      (function () {
        try {
          var host = window.location.hostname;
          if (host === "thenotagency.com" || host === "www.thenotagency.com") {
            var link = document.querySelector("link[rel='icon']");
            if (!link) {
              link = document.createElement("link");
              link.rel = "icon";
              document.head.appendChild(link);
            }
            link.type = "image/png";
            link.href = "/favicon-notagency.png";
            document.title = "The Not Agency";
          }
        } catch (e) {}
      })();
    </script>

    <!-- Preload critical Not Agency display fonts so the browser fetches them
         in parallel with HTML parsing, before the JS bundle even runs. -->
    <link rel="preload" as="font" type="font/ttf" href="/fonts/PlacardNext-CondBold.ttf" crossorigin />
    <link rel="preload" as="font" type="font/woff2" href="/fonts/TAN-StCanard-Regular.woff2" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
